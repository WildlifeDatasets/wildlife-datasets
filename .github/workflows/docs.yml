name: Docs

on:
  workflow_call:
    inputs:
      deploy:
        description: "Push the built docs to gh-pages"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install ".[docs]"
      - name: Build docs
        run: mkdocs build

      - name: Deploy docs
        if: inputs.deploy
        run: mkdocs gh-deploy --force